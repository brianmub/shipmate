server {
    listen 80;
    listen [::]:80;

    server_name shipmate.co.zw www.shipmate.co.zw;

    root /var/www/shipmate;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (Vite builds use hashed names)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # Prevent caching of index.html/other HTML files to ensure instant updates
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    error_log /var/log/nginx/shipmate_error.log;
    access_log /var/log/nginx/shipmate_access.log;
}
